<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="NovaCode - Desarrollo web profesional y soluciones digitales">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#1a0a1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b978cc"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="80"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1050" cy="100" r="240" fill="#b978cc" opacity="0.18" filter="url(#blur)"/>
  <circle cx="150" cy="530" r="240" fill="#87da4a" opacity="0.12" filter="url(#blur)"/>
  <text x="600" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="700" fill="url(#accent)">NovaCode</text>
  <text x="600" y="400" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500" fill="#ffffff" opacity="0.8">Desarrollo web profesional</text>
  <text x="600" y="445" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500" fill="#ffffff" opacity="0.8">y soluciones digitales</text>
  <text x="600" y="560" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="500" fill="#ffbb00">novacode.com.ar</text>
</svg>
